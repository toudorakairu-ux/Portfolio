<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Landing</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: #0f3d2e;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 400px;
      animation: fadeIn 1.5s ease forwards;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 1s ease forwards;
      animation-delay: 0.3s;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
      color: #dcdcdc;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 1s ease forwards;
      animation-delay: 0.6s;
    }

    .btn {
      display: inline-block;
      background: #2ecc71;
      color: #0f3d2e;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 1s ease forwards;
      animation-delay: 0.9s;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #27ae60;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.7);
    }

    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(46,204,113,0.1) 0%, transparent 70%);
      animation: moveBg 10s linear infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes moveBg {
      from { transform: translate(0, 0); }
      to { transform: translate(-25%, -25%); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>TUDLA, KYLE JHIAN C.</h1>
    <p>BSIT - Your Section Here</p>
    <a href=https://github.com/toudorakairu-ux/Portfolio/blob/main/Portfolio.pdf class="btn"target="_blank">
    View My Portfolio </a>
  </div>

</body>
</html>
